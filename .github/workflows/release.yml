name: Release

# Triggered when a GitHub Release is published.
# Builds CLI + API-server binaries for all five platforms, bundles each with
# its native runtime library (libtorch on Linux, mlx.metallib on macOS), and
# uploads the resulting zip files as release assets.

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Download only the SentencePiece tokenizer file from HuggingFace (~800 KB)
  # and convert it to vocab.json once; all build jobs share the artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  generate-vocab:
    name: Generate vocab.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download tokenizer from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub sentencepiece
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download('CohereLabs/cohere-transcribe-03-2026',
                           local_dir='models/cohere-transcribe-03-2026',
                           allow_patterns=['tokenizer.model'],
                           token='$HF_TOKEN')
          "
          python tools/extract_vocab.py --model_dir models/cohere-transcribe-03-2026

      - name: Upload vocab artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocab
          path: models/cohere-transcribe-03-2026/vocab.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Build both binaries (transcribe CLI + transcribe-server) for each platform,
  # bundle with native libraries, and upload as a release asset zip.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    needs: generate-vocab
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 — CPU libtorch ───────────────────────────────────
          - os: ubuntu-latest
            name: Linux x86_64
            backend: tch
            asset-name: transcribe-linux-x86_64
            libtorch-url: >-
              https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-x86_64-2.7.1.tar.gz

          # ── Linux x86_64 — CUDA 12.6 libtorch ────────────────────────────
          - os: ubuntu-latest
            name: Linux x86_64 (CUDA)
            backend: tch
            asset-name: transcribe-linux-x86_64-cuda
            needs-cuda: true
            libtorch-url: >-
              https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-x86_64-cuda12.6-2.7.1.tar.gz

          # ── Linux aarch64 — CPU libtorch (SVE256, Graviton3 / Altra) ─────
          - os: ubuntu-24.04-arm
            name: Linux aarch64
            backend: tch
            asset-name: transcribe-linux-aarch64
            libtorch-url: >-
              https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-2.7.1.tar.gz

          # ── Linux aarch64 — CUDA 12.6 libtorch (Jetson / Grace) ─────────
          - os: ubuntu-24.04-arm
            name: Linux aarch64 (CUDA)
            backend: tch
            asset-name: transcribe-linux-aarch64-cuda
            needs-cuda: true
            libtorch-url: >-
              https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-cuda12.6-2.7.1.tar.gz

          # ── macOS Apple Silicon — MLX backend ────────────────────────────
          - os: macos-latest
            name: macOS Apple Silicon
            backend: mlx
            asset-name: transcribe-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        if: matrix.backend == 'tch'

      - uses: actions/checkout@v4
        if: matrix.backend == 'mlx'
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # ── CUDA toolkit (for linking CUDA-enabled libtorch) ─────────────────
      - name: Install CUDA toolkit (x86_64)
        if: matrix.needs-cuda && runner.arch == 'X64'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6

      - name: Install CUDA toolkit and BLAS (aarch64)
        if: matrix.needs-cuda && runner.arch == 'ARM64'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6 libopenblas-dev

      # ── libtorch (Linux) ──────────────────────────────────────────────────
      - name: Download and extract libtorch
        if: matrix.backend == 'tch'
        run: |
          curl -fsSLo libtorch.tar.gz "${{ matrix.libtorch-url }}"
          tar xzf libtorch.tar.gz          # → ./libtorch/
          rm libtorch.tar.gz

      # ── Set linker flags (Linux only) ─────────────────────────────────────
      # RPATH $ORIGIN/libtorch/lib lets the binary find libtorch in the
      # adjacent libtorch/ folder when deployed, with no LD_LIBRARY_PATH.
      - name: Set linker flags
        if: matrix.backend == 'tch' && runner.os == 'Linux'
        run: |
          FLAGS="-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib -C link-arg=-Wl,-rpath,\$ORIGIN/libtorch/lib"
          if [ "${{ matrix.needs-cuda }}" = "true" ]; then
            FLAGS="$FLAGS -C link-arg=-Wl,-rpath-link,/usr/local/cuda/lib64"
            echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi
          echo "RUSTFLAGS=$FLAGS" >> "$GITHUB_ENV"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release binaries (tch-backend)
        if: matrix.backend == 'tch'
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
        run: cargo build --release

      - name: Build release binaries (mlx)
        if: matrix.backend == 'mlx'
        run: cargo build --release --no-default-features --features mlx
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      # ── Download shared vocab ─────────────────────────────────────────────
      - name: Download vocab.json
        uses: actions/download-artifact@v4
        with:
          name: vocab

      # ── Package (Linux / tch) ─────────────────────────────────────────────
      - name: Package release (Linux)
        if: matrix.backend == 'tch'
        run: |
          DIR=${{ matrix.asset-name }}
          mkdir -p "$DIR"

          # Binaries
          cp target/release/transcribe        "$DIR/transcribe"
          cp target/release/transcribe-server "$DIR/transcribe-server"
          cp vocab.json                       "$DIR/vocab.json"

          # Strip debug info from our binaries
          strip "$DIR/transcribe" "$DIR/transcribe-server"

          # Bundle libtorch (runtime libraries — the binary finds them via RPATH)
          cp -r libtorch "$DIR/libtorch"

          zip -r "$DIR.zip" "$DIR"
          echo "=== Package contents ==="
          zipinfo "$DIR.zip" | head -30

      # ── Package (macOS / mlx) ─────────────────────────────────────────────
      - name: Package release (macOS)
        if: matrix.backend == 'mlx'
        run: |
          DIR=${{ matrix.asset-name }}
          mkdir -p "$DIR"

          # Binaries (statically linked — no dylibs to bundle)
          cp target/release/transcribe        "$DIR/transcribe"
          cp target/release/transcribe-server "$DIR/transcribe-server"
          cp vocab.json                       "$DIR/vocab.json"

          # Metal shader library — build.rs copies it to target/release/
          cp target/release/mlx.metallib "$DIR/mlx.metallib"
          ls -lh "$DIR/"

          zip -r "$DIR.zip" "$DIR"
          echo "=== Package contents ==="
          zipinfo "$DIR.zip" | head -30

      # ── Upload to GitHub Release ──────────────────────────────────────────
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.asset-name }}.zip"
